<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 380" width="880" height="380"
     font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif"
     role="img" aria-label="数据流：OpenAI 格式 harness → glm-toolbridge 适配层 → GLM-5.2，去程 denormalize，回程 normalize">
  <defs>
    <marker id="ah-al" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#B9B9C2"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="880" height="380" fill="#F5F5F7"/>

  <text x="40" y="42" font-size="17" font-weight="700" fill="#1D1D1F">架构与数据流</text>
  <text x="40" y="62" font-size="12" font-weight="500" fill="#6E6E73">单进程 Python 库，无服务；harness 的 OpenAI 代码路径一行不改</text>

  <!-- top row: outbound (denormalize) -->
  <text x="40" y="108" font-size="11" font-weight="600" fill="#4B3FC4">去程 ↓  denormalize_request(tools)</text>
  <text x="40" y="300" font-size="11" font-weight="600" fill="#0B6B53">回程 ↑  normalize_response()</text>

  <!-- connectors outbound -->
  <g stroke="#C9C9D0" stroke-width="1.5" fill="none">
    <line x1="230" y1="148" x2="338" y2="148" marker-end="url(#ah-al)"/>
    <line x1="542" y1="148" x2="650" y2="148" marker-end="url(#ah-al)"/>
  </g>
  <!-- connectors inbound -->
  <g stroke="#C9C9D0" stroke-width="1.5" fill="none">
    <line x1="650" y1="252" x2="542" y2="252" marker-end="url(#ah-al)"/>
    <line x1="338" y1="252" x2="230" y2="252" marker-end="url(#ah-al)"/>
  </g>

  <!-- node: harness (purple) -->
  <rect x="40" y="138" width="190" height="124" rx="15" fill="#5E5CE6" fill-opacity="0.10" stroke="#5E5CE6" stroke-width="1.5"/>
  <text x="135" y="178" text-anchor="middle" font-size="14" font-weight="600" fill="#4B3FC4">你的 harness</text>
  <text x="135" y="198" text-anchor="middle" font-size="11" font-weight="500" fill="#6E6E73">Claude Code · Cursor</text>
  <text x="135" y="216" text-anchor="middle" font-size="11" font-weight="500" fill="#6E6E73">硬编码 OpenAI</text>
  <text x="135" y="232" text-anchor="middle" font-size="11" font-weight="500" fill="#6E6E73">tool_calls 解析</text>

  <!-- node: bridge (accent) -->
  <rect x="340" y="138" width="200" height="124" rx="15" fill="#5E5CE6" fill-opacity="0.13" stroke="#5E5CE6" stroke-width="1.5"/>
  <text x="440" y="172" text-anchor="middle" font-size="14" font-weight="700" fill="#4B3FC4">glm-toolbridge</text>
  <text x="440" y="190" text-anchor="middle" font-size="11" font-weight="500" fill="#6E6E73">透明代理 · 同一接口</text>
  <line x1="362" y1="200" x2="518" y2="200" stroke="#C9C9D0" stroke-width="1"/>
  <text x="440" y="217" text-anchor="middle" font-size="10.5" font-weight="500" fill="#0B6B53">arg_encoding · parallel_calls</text>
  <text x="440" y="233" text-anchor="middle" font-size="10.5" font-weight="500" fill="#0B6B53">reasoning · streaming</text>
  <text x="440" y="251" text-anchor="middle" font-size="10" font-weight="500" fill="#6E6E73">未知 shape → 显式报错</text>

  <!-- node: GLM (teal) -->
  <rect x="650" y="138" width="190" height="124" rx="15" fill="#10A37F" fill-opacity="0.10" stroke="#10A37F" stroke-width="1.5"/>
  <text x="745" y="184" text-anchor="middle" font-size="14" font-weight="600" fill="#0B6B53">GLM-5.2 端点</text>
  <text x="745" y="204" text-anchor="middle" font-size="11" font-weight="500" fill="#6E6E73">智谱 open.bigmodel.cn</text>
  <text x="745" y="222" text-anchor="middle" font-size="11" font-weight="500" fill="#6E6E73">GLM 形状的</text>
  <text x="745" y="238" text-anchor="middle" font-size="11" font-weight="500" fill="#6E6E73">tool-call 响应</text>

  <!-- footer caption -->
  <text x="440" y="346" text-anchor="middle" font-size="11.5" font-weight="500" fill="#6E6E73">去程把 OpenAI tool 定义降格给 GLM；回程把 GLM 响应还原成 OpenAI tool_calls —— harness 全程无感</text>
</svg>
