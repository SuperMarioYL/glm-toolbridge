<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 300" width="880" height="300"
     font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif"
     role="img" aria-label="glm-toolbridge — 把 GLM-5.2 接进任意 OpenAI 格式编码 agent，tool-call 不再静默错配">
  <defs>
    <linearGradient id="hl-accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#5E5CE6"/>
      <stop offset="1" stop-color="#10A37F"/>
    </linearGradient>
    <marker id="ah-hl" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#B9B9C2"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="880" height="300" fill="#F5F5F7"/>

  <!-- subtle bridge motif: OpenAI side -> bridge -> GLM side -->
  <g stroke="#C9C9D0" stroke-width="1.5" fill="none">
    <line x1="190" y1="210" x2="360" y2="210" marker-end="url(#ah-hl)"/>
    <line x1="520" y1="210" x2="690" y2="210" marker-end="url(#ah-hl)"/>
  </g>

  <!-- left node: OpenAI-shaped harness -->
  <rect x="40" y="184" width="150" height="52" rx="14" fill="#5E5CE6" fill-opacity="0.10" stroke="#5E5CE6" stroke-width="1.5"/>
  <text x="115" y="210" text-anchor="middle" font-size="12.5" font-weight="600" fill="#4B3FC4">OpenAI 格式</text>
  <text x="115" y="226" text-anchor="middle" font-size="11" font-weight="500" fill="#6E6E73">coding agent</text>

  <!-- middle node: the bridge -->
  <rect x="365" y="180" width="150" height="60" rx="15" fill="url(#hl-accent)" fill-opacity="0.16" stroke="#5E5CE6" stroke-width="1.5"/>
  <text x="440" y="206" text-anchor="middle" font-size="12.5" font-weight="700" fill="#4B3FC4">glm-toolbridge</text>
  <text x="440" y="224" text-anchor="middle" font-size="11" font-weight="500" fill="#0B6B53">wrap(client)</text>

  <!-- right node: GLM-5.2 -->
  <rect x="690" y="184" width="150" height="52" rx="14" fill="#10A37F" fill-opacity="0.10" stroke="#10A37F" stroke-width="1.5"/>
  <text x="765" y="210" text-anchor="middle" font-size="12.5" font-weight="600" fill="#0B6B53">GLM-5.2</text>
  <text x="765" y="226" text-anchor="middle" font-size="11" font-weight="500" fill="#6E6E73">智谱</text>

  <!-- title block -->
  <text x="40" y="92" font-size="52" font-weight="700" fill="#1D1D1F" letter-spacing="-1">glm-toolbridge</text>
  <text x="42" y="132" font-size="18" font-weight="500" fill="#6E6E73">让 GLM-5.2 的 tool-call 在 OpenAI 格式编码 agent 里正确解析的协议适配层</text>
  <rect x="42" y="150" width="92" height="3" rx="1.5" fill="url(#hl-accent)"/>
</svg>
