name: release

on:
  push:
    tags: ["v*.*.*"]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"

      - name: Build wheel + sdist
        run: |
          uv build --out-dir dist
          ls -l dist

      - name: Generate checksums
        run: |
          cd dist
          sha256sum * > checksums.txt
          cat checksums.txt

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/*

  # Optional PyPI trusted publishing. Enable by configuring a trusted publisher
  # for this repo on PyPI (no API token needed) and removing the `if: false`.
  publish-pypi:
    needs: build
    runs-on: ubuntu-latest
    if: false
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist
      - name: Drop checksums before upload
        run: rm -f dist/checksums.txt
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
