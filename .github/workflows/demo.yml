name: demo

on:
  workflow_dispatch: {}
  push:
    tags: ["v*.*.*"]

permissions:
  contents: write

jobs:
  vhs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"

      - name: Sync dependencies
        run: uv sync

      # vhs-action's self-install of ffmpeg is flaky on GH runners — pre-install it.
      - name: Install ffmpeg + ttyd
        run: sudo apt-get update && sudo apt-get install -y ffmpeg ttyd

      - name: Render demo tape
        uses: charmbracelet/vhs-action@v2
        with:
          path: docs/demo.tape
          install-fonts: true

      - name: Commit rendered gif
        run: |
          git config user.name  "${{ github.actor }}"
          git config user.email "${{ github.actor }}@users.noreply.github.com"
          git add assets/demo.gif
          git commit -m "chore: render demo gif" || { echo "no change"; exit 0; }
          git push origin HEAD:main
